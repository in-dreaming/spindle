name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: ${{ matrix.os }} test-all
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/zig
            ~/AppData/Local/zig
            .zig-cache
          key: ${{ runner.os }}-zig-0.16.0-${{ hashFiles('build.zig.zon') }}
      - run: zig build test-all

  bench-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/zig
            .zig-cache
          key: ubuntu-zig-0.16.0-${{ hashFiles('build.zig.zon') }}
      - run: zig build bench -Doptimize=ReleaseFast
